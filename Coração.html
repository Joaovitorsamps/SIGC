<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Árvore de Corações</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

.text{
    position:absolute;
    width:100%;
    text-align:center;
    top:40px;
    color:white;
    font-size:40px;
    letter-spacing:3px;
}
</style>

</head>

<body>

<div class="text">Te Amo ❤️</div>
<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

/* função que gera formato de coração */
function heartFunction(t){

    const x = 16 * Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);

    return {
        x: x,
        y: -y
    }

}

/* cria partículas */
for(let i=0;i<1500;i++){

    let t = Math.random() * Math.PI * 2;

    let pos = heartFunction(t);

    particles.push({

        x: canvas.width/2 + pos.x * 15 + (Math.random()*20-10),
        y: canvas.height/2 + pos.y * 15 + (Math.random()*20-10),

        size: Math.random()*3+1,
        alpha: Math.random(),
        speed: Math.random()*0.02

    });

}

/* desenhar coração */
function drawHeart(x,y,size,alpha){

    ctx.save();
    ctx.translate(x,y);
    ctx.scale(size,size);
    ctx.beginPath();

    ctx.moveTo(0,0);
    ctx.bezierCurveTo(0,-3,-5,-3,-5,0);
    ctx.bezierCurveTo(-5,3,0,5,0,7);
    ctx.bezierCurveTo(0,5,5,3,5,0);
    ctx.bezierCurveTo(5,-3,0,-3,0,0);

    ctx.fillStyle = "rgba(255,0,80,"+alpha+")";
    ctx.fill();

    ctx.restore();

}

/* animação */

function animate(){

    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        drawHeart(p.x,p.y,p.size,p.alpha);

        p.alpha += p.speed;

        if(p.alpha > 1) p.alpha = 0;

    });

    requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
